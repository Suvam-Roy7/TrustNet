spring:
  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerialize

      properties:
        spring.json.trusted.packages: com.social.NotificationService.Event
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.social.NotificationService.Event.FollowCreatedEvent

    listener:
      ack-mode: record